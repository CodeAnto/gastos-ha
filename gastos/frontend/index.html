<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gastos · Hogar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: dark; }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        /* Fintech dark: azul confianza + verde beneficio, sutiles, sobre navy profundo */
        background:
          radial-gradient(1100px 600px at 12% -10%, rgba(59,130,246,0.12), transparent 60%),
          radial-gradient(1000px 520px at 100% 0%, rgba(34,197,94,0.08), transparent 58%),
          #020617;
        background-attachment: fixed;
      }
      /* Scrollbar discreto en oscuro */
      *::-webkit-scrollbar { width: 10px; height: 10px; }
      *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }
      *::-webkit-scrollbar-track { background: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
